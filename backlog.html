<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GameLog — My Backlog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/backlog.css">
</head>

<!-- Confirm delete modal -->
<div class="modal-overlay" id="confirm-overlay">
  <div class="modal" style="max-width: 360px; text-align: center;">
    <h2 style="font-size: 1.1rem;">Remove Game?</h2>
    <p class="text-muted" style="font-size: 0.88rem;">
      This will permanently remove the game from your backlog.
    </p>
    <div class="modal-footer" style="justify-content: center;">
      <button class="btn btn-danger" id="confirm-delete-btn">
        Remove
      </button>
      <button class="btn" id="confirm-cancel-btn"
        style="background: var(--surface-2); color: var(--muted);">
        Cancel
      </button>
    </div>
  </div>
</div>

<body>

  <nav>
    <span class="logo">🎮 GameLog</span>
    <div class="nav-links">
      <a href="index.html">Search</a>
      <a href="backlog.html" class="active">My Backlog</a>
      <a href="stats.html">Stats</a>
    </div>
  </nav>

  <div class="container">
    <h1 class="page-title">My Backlog</h1>

    <div class="filter-tabs">
      <button class="filter-tab active" data-status="all">All</button>
      <button class="filter-tab" data-status="want_to_play">Want to Play</button>
      <button class="filter-tab" data-status="currently_playing">Playing</button>
      <button class="filter-tab" data-status="completed">Completed</button>
      <button class="filter-tab" data-status="dropped">Dropped</button>
    </div>

    <div class="backlog-list" id="backlog-list">
      <!-- Backlog items appear here -->
    </div>
  </div>

  <script type="module" src="js/controllers/backlog-handlers.js"></script>
      <!-- Edit Modal -->
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal">
        <div class="modal-header">
          <h2 class="modal-title" id="modal-game-title">Edit Game</h2>
          <button class="modal-close" id="modal-close">✕</button>
        </div>

        <div class="modal-body">
          <div class="form-group">
            <label>Status</label>
            <select class="card-select" id="modal-status">
              <option value="want_to_play">Want to Play</option>
              <option value="currently_playing">Currently Playing</option>
              <option value="completed">Completed</option>
              <option value="dropped">Dropped</option>
            </select>
          </div>

          <div class="form-group">
            <label>Personal Rating</label>
            <div class="rating-row">
              <input 
                type="range" 
                id="modal-rating" 
                min="0" max="10" step="1" 
                value="0"
              />
              <span class="rating-display" id="rating-display">0/10</span>
            </div>
          </div>

          <div class="form-group">
            <label>Hours Played</label>
            <input 
              type="number" 
              class="modal-input" 
              id="modal-hours" 
              min="0" 
              placeholder="0"
            />
          </div>
        </div>

        <div class="modal-footer">
          <button class="btn btn-primary" id="modal-save">Save Changes</button>
          <button class="btn" id="modal-cancel"
            style="background: var(--surface-2); color: var(--muted);"
          >
            Cancel
          </button>
        </div>
      </div>
    </div>
  </body>
</html>


<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/backlog.css">
