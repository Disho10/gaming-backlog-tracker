<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GameLog — My Backlog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/backlog.css">
</head>
<body>

  <nav>
    <span class="logo">🎮 GameLog</span>
    <div class="nav-links">
      <a href="index.html">Search</a>
      <a href="backlog.html" class="active">My Backlog</a>
      <a href="stats.html">Stats</a>
    </div>
  </nav>

  <div class="container">
    <h1 class="page-title">My Backlog</h1>

    <div class="filter-tabs">
      <button class="filter-tab active" data-status="all">All</button>
      <button class="filter-tab" data-status="want_to_play">Want to Play</button>
      <button class="filter-tab" data-status="currently_playing">Playing</button>
      <button class="filter-tab" data-status="completed">Completed</button>
      <button class="filter-tab" data-status="dropped">Dropped</button>
    </div>

    <div class="backlog-list" id="backlog-list">
      <!-- Backlog items appear here -->
    </div>
  </div>

  <script type="module" src="js/controllers/backlog-handlers.js"></script>
</body>
</html>


<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/backlog.css">
